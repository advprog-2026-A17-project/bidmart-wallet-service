spring.application.name=bidmart-wallet-service
server.port=${PORT:${SERVER_PORT:8083}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bidmart_wallet_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:password}}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

app.wallet.provisioning.queue=${WALLET_PROVISIONING_QUEUE:wallet.provision.queue}
app.wallet.provisioning.exchange=${WALLET_PROVISIONING_EXCHANGE:bidmart.wallet.provisioning}
app.wallet.provisioning.routing-key=${WALLET_PROVISIONING_ROUTING_KEY:wallet.provision.requested.v1}
app.wallet.provisioning.retry-attempts=${WALLET_PROVISIONING_RETRY_ATTEMPTS:3}
app.wallet.provisioning.dlx=${WALLET_PROVISIONING_DLX:wallet.provisioning.dlx}
app.wallet.provisioning.dlq=${WALLET_PROVISIONING_DLQ:wallet.provisioning.dlq}
app.wallet.provisioning.dlq-routing-key=${WALLET_PROVISIONING_DLQ_ROUTING_KEY:wallet.provisioning.failed.v1}
app.wallet.provisioning.reconciliation.fixed-delay-ms=${WALLET_PROVISIONING_RECONCILIATION_DELAY_MS:300000}
app.wallet.provisioning.reconciliation.batch-size=${WALLET_PROVISIONING_RECONCILIATION_BATCH_SIZE:200}
